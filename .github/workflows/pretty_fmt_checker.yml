name: Pretty Fmt Checker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  fmt-check:
    name: v fmt -verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up V
        uses: vlang/setup-v@v1.7
      - name: Remove Vlang folder to avoid conflicts
        shell: bash
        run: |
          rm -rf -v ./vlang || true
      - name: Run v fmt checker
        shell: bash
        run: |
          v fmt -verify .
      # On failure, print the exact reformatting vfmt wants, so a contributor
      # (or a bot) can fix files from the log alone — `-verify` only names
      # the offending files.
      - name: Show vfmt diff for the offending files
        if: failure()
        shell: bash
        run: |
          v fmt -diff . || true
