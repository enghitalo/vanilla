name: (Windows) Build & Test Examples

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # The server-module tests include the backend-agnostic behaviour suite
  # (pipelining, split-request framing, max_connections, read timeout,
  # graceful shutdown, large-upload streaming drain), which runs against the
  # IOCP backend on Windows.
  module-tests:
    runs-on: windows-latest
    name: server module tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up V
        uses: vlang/setup-v@v1.7
      - name: Remove Vlang folder to avoid conflicts
        shell: bash
        run: |
          rm -rfv vlang || true
      - name: Test server modules
        shell: bash
        run: |
          v test server core http1_1 http2 websocket socket epoll io_uring kqueue iocp tls static_assets testkit

  examples-building-and-testing:
    runs-on: windows-latest
    name: ${{ matrix.folder }}
    strategy:
      fail-fast: false # Continue other jobs if one fails
      matrix:
        # examples/database and examples/hexagonal need libpq (and sqlite),
        # which the Windows runner does not provide — they are covered by the
        # Linux workflow.
        folder:
          - examples/auth/src
          - examples/compression/src
          - examples/conformance/src
          - examples/etag/src
          - examples/io_uring_demo/src
          - examples/json_api/src
          - examples/middleware/src
          - examples/simple/src
          - examples/simple2/src
          - examples/sse/src
          # websocket_echo: the takeover seam is epoll-only, but the example must
          # degrade cleanly elsewhere — the 501-fallback + codec tests run here.
          - examples/websocket_echo/src
          # http2_cleartext: same story — the 501-fallback + the pure-bytes
          # bridge tests run here; the socket e2e is Linux-guarded.
          - examples/http2_cleartext/src
    steps:
      - uses: actions/checkout@v4
      - name: Set up V
        uses: vlang/setup-v@v1.7
      - name: Remove Vlang folder to avoid conflicts
        shell: bash
        run: |
          rm -rfv vlang || true

      - name: Build ${{ matrix.folder }}
        shell: bash
        run: |
          v "${{ matrix.folder }}"
      - name: Test ${{ matrix.folder }}
        shell: bash
        run: |
          v test "${{ matrix.folder }}"
