name: (Linux) Build & Test Examples

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  examples-building-and-testing:
    runs-on: ubuntu-latest
    name: ${{ matrix.folder }}
    strategy:
      fail-fast: false # Continue other jobs if one fails
      matrix:
        folder:
          - examples/async_pipe/src
          - examples/database/src
          - examples/etag/src
          - examples/hexagonal/src
          - examples/io_uring_demo/src
          - examples/simple/src
          - examples/simple2/src
          - examples/sse/src
    steps:
      - uses: actions/checkout@v4
      - name: Set up V 0.5.1 (prebuilt release)
        shell: bash
        # Install the official prebuilt 0.5.1 binary directly, NOT via setup-v.
        # setup-v always source-builds: its default (latest master) currently
        # regresses `u32(C.EPOLLIN | C.EPOLLET)` and breaks every epoll example,
        # and source-building the 0.5.1 *tag* fails with `unknown ident native`
        # (the make/latest_vc mismatch). The prebuilt release is what the
        # Dockerfiles ship and builds the lib cleanly.
        run: |
          curl -fsSL https://github.com/vlang/v/releases/download/0.5.1/v_linux.zip -o /tmp/v.zip
          unzip -q /tmp/v.zip -d "$HOME"
          echo "$HOME/v" >> "$GITHUB_PATH"
      - name: Remove Vlang folder to avoid conflicts
        shell: bash
        run: |
          rm -rf -v ./vlang || true

      - name: Install dependencies
        shell: bash
        run: |
          # Just the build deps. The previous `apt upgrade -y linux-generic` pulled a
          # full kernel package set (linux-image/headers/firmware) on every run — slow
          # and flaky (dpkg "cannot perform the following tasks"), and pointless for
          # building examples: liburing-dev is userspace and linux-libc-dev already
          # ships the io_uring headers, neither needs a running-kernel upgrade.
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev liburing-dev linux-libc-dev
      - name: Build ${{ matrix.folder }}
        shell: bash
        run: |
          v $(pwd)/${{ matrix.folder }}
      - name: Test ${{ matrix.folder }}
        shell: bash
        run: |
          v test $(pwd)/${{ matrix.folder }}
