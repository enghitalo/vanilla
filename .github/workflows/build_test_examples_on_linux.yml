name: (Linux) Build & Test Examples

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  examples-building-and-testing:
    runs-on: ubuntu-latest
    name: ${{ matrix.folder }}
    strategy:
      fail-fast: false # Continue other jobs if one fails
      matrix:
        folder:
          - examples/database/src
          - examples/etag/src
          - examples/hexagonal/src
          - examples/io_uring_demo/src
          - examples/simple/src
          - examples/simple2/src
          - examples/sse/src
    steps:
      - uses: actions/checkout@v4
      - name: Set up V
        uses: vlang/setup-v@v1.4
        # Pin to the latest V *release* (0.5.1), not master: the lib ships on
        # 0.5.1 (HttpArena & the-benchmarker pin it) and master carries codegen/GC
        # regressions (vlang/v#27468) the library must not be tested against.
        with:
          stable: true
      - name: Remove Vlang folder to avoid conflicts
        shell: bash
        run: |
          rm -rf -v ./vlang || true

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt update && sudo apt upgrade -y linux-generic
          sudo apt-get install -y libsqlite3-dev liburing-dev linux-libc-dev
      - name: Build ${{ matrix.folder }}
        shell: bash
        run: |
          v $(pwd)/${{ matrix.folder }}
      - name: Test ${{ matrix.folder }}
        shell: bash
        run: |
          v test $(pwd)/${{ matrix.folder }}
