name: (MacOS) Build & Test Examples

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  examples-building-and-testing:
    runs-on: macos-latest
    name: ${{ matrix.folder }}
    strategy:
      fail-fast: false # Continue other jobs if one fails
      matrix:
        folder:
          - examples/async_pipe/src
          - examples/chunked_streaming/src
          - examples/compression/src
          - examples/database/src
          - examples/etag/src
          - examples/hexagonal/src
          - examples/io_uring_demo/src
          # - examples/simple/src
          - examples/simple2/src
          - examples/sse/src
    steps:
      - uses: actions/checkout@v4
      - name: Set up V
        uses: vlang/setup-v@v1.7
      - name: Remove Vlang folder to avoid conflicts
        shell: bash
        run: |
          rm -rf -v ./vlang || true

      - name: Install dependencies
        shell: bash
        run: |
            brew update
            # brotli: compress.brotli dlopens /opt/homebrew/lib/libbrotli{enc,dec}.dylib,
            # so the compression example exercises the `br` path for real.
            brew install sqlite3 brotli
      - name: Build ${{ matrix.folder }}
        shell: bash
        run: |
          v $(pwd)/${{ matrix.folder }}
      - name: Test ${{ matrix.folder }}
        shell: bash
        run: |
          v test $(pwd)/${{ matrix.folder }}
